<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>MBTI 人格探索之旅</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;min-height:100vh;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);display:flex;justify-content:center;align-items:center;color:#fff;overflow-x:hidden}
.bg-particles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.bg-particles span{position:absolute;display:block;width:20px;height:20px;background:rgba(255,255,255,0.04);border-radius:50%;animation:floatParticle 20s infinite linear}
.bg-particles span:nth-child(1){left:10%;width:40px;height:40px;animation-delay:0s;animation-duration:18s}
.bg-particles span:nth-child(2){left:25%;width:25px;height:25px;animation-delay:2s;animation-duration:22s}
.bg-particles span:nth-child(3){left:40%;width:15px;height:15px;animation-delay:4s;animation-duration:16s}
.bg-particles span:nth-child(4){left:55%;width:30px;height:30px;animation-delay:1s;animation-duration:20s}
.bg-particles span:nth-child(5){left:70%;width:35px;height:35px;animation-delay:3s;animation-duration:24s}
.bg-particles span:nth-child(6){left:85%;width:20px;height:20px;animation-delay:5s;animation-duration:19s}
.bg-particles span:nth-child(7){left:50%;width:50px;height:50px;animation-delay:6s;animation-duration:21s}
.bg-particles span:nth-child(8){left:5%;width:18px;height:18px;animation-delay:7s;animation-duration:17s}
.bg-particles span:nth-child(9){left:90%;width:28px;height:28px;animation-delay:8s;animation-duration:23s}
.bg-particles span:nth-child(10){left:35%;width:22px;height:22px;animation-delay:9s;animation-duration:15s}
@keyframes floatParticle{0%{transform:translateY(100vh) rotate(0deg);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateY(-10vh) rotate(720deg);opacity:0}}
.container{position:relative;z-index:1;width:100%;max-width:720px;padding:20px;margin:20px}
.card{background:rgba(255,255,255,0.08);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.15);border-radius:24px;padding:40px 36px;box-shadow:0 25px 60px rgba(0,0,0,0.4)}
.screen{display:none}.screen.active{display:block}
#startScreen{text-align:center}
.logo-icon{font-size:72px;margin-bottom:16px;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.title{font-size:2.2rem;font-weight:800;background:linear-gradient(135deg,#f093fb,#f5576c,#4facfe);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
.subtitle{font-size:.95rem;color:rgba(255,255,255,0.6);margin-bottom:28px;letter-spacing:2px}
.disclaimer{font-size:.8rem;color:rgba(255,255,255,0.35);line-height:1.6;margin-bottom:32px;padding:0 10px}
.btn-start{display:inline-block;padding:16px 56px;font-size:1.1rem;font-weight:700;color:#fff;background:linear-gradient(135deg,#f093fb,#f5576c);border:none;border-radius:50px;cursor:pointer;transition:all .3s ease;letter-spacing:2px;box-shadow:0 8px 30px rgba(245,87,108,0.4)}
.btn-start:hover{transform:translateY(-3px) scale(1.02);box-shadow:0 12px 40px rgba(245,87,108,0.6)}
.btn-start:active{transform:translateY(0) scale(.98)}
.progress-wrapper{margin-bottom:24px}
.progress-info{display:flex;justify-content:space-between;font-size:.85rem;color:rgba(255,255,255,0.5);margin-bottom:8px}
.progress-bar{width:100%;height:6px;background:rgba(255,255,255,0.1);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;width:0%;background:linear-gradient(90deg,#f093fb,#f5576c,#4facfe);border-radius:3px;transition:width .5s cubic-bezier(0.22,1,0.36,1)}
.dimension-tag{display:inline-block;padding:4px 14px;border-radius:20px;font-size:.75rem;font-weight:600;letter-spacing:1px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);margin-bottom:16px;color:rgba(255,255,255,0.7)}
.question-text{font-size:1.35rem;font-weight:600;line-height:1.6;margin-bottom:28px;min-height:3.2em}
.options{display:flex;flex-direction:column;gap:14px}
.option-btn{display:flex;align-items:center;gap:14px;padding:16px 20px;background:rgba(255,255,255,0.06);border:1.5px solid rgba(255,255,255,0.12);border-radius:16px;color:#fff;font-size:.98rem;line-height:1.5;cursor:pointer;transition:all .25s ease;text-align:left;position:relative;overflow:hidden}
.option-btn:hover{background:rgba(255,255,255,0.12);border-color:rgba(255,255,255,0.25);transform:translateX(4px)}
.option-btn.selected{border-color:#f5576c;background:rgba(245,87,108,0.15);box-shadow:0 0 20px rgba(245,87,108,0.15)}
.option-letter{width:32px;height:32px;flex-shrink:0;display:flex;align-items:center;justify-content:center;border-radius:50%;font-weight:700;font-size:.85rem;background:rgba(255,255,255,0.1);transition:all .25s ease}
.option-btn.selected .option-letter{background:linear-gradient(135deg,#f093fb,#f5576c)}
.option-text{flex:1}
.question-transition{animation:slideIn .4s cubic-bezier(0.22,1,0.36,1)}
@keyframes slideIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
.nav-buttons{display:flex;justify-content:space-between;margin-top:28px;gap:12px}
.nav-btn{padding:12px 28px;border:1.5px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.06);color:#fff;font-size:.9rem;font-weight:600;border-radius:12px;cursor:pointer;transition:all .25s ease}
.nav-btn:hover:not(:disabled){background:rgba(255,255,255,0.12);border-color:rgba(255,255,255,0.3)}
.nav-btn:disabled{opacity:.3;cursor:not-allowed}
.nav-btn.next{background:linear-gradient(135deg,#667eea,#764ba2);border-color:transparent}
.nav-btn.next:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 6px 20px rgba(118,75,162,0.4)}
.nav-btn.submit{background:linear-gradient(135deg,#f093fb,#f5576c);border-color:transparent}
.nav-btn.submit:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 6px 20px rgba(245,87,108,0.4)}
#resultScreen{text-align:center}
.result-type-badge{display:inline-flex;align-items:center;justify-content:center;width:120px;height:120px;border-radius:30px;font-size:3rem;font-weight:800;letter-spacing:4px;background:linear-gradient(135deg,#f093fb,#4facfe);box-shadow:0 12px 40px rgba(79,172,254,0.3);margin-bottom:16px;animation:badgeReveal .6s cubic-bezier(0.22,1,0.36,1)}
@keyframes badgeReveal{0%{transform:scale(0) rotate(-15deg);opacity:0}100%{transform:scale(1) rotate(0);opacity:1}}
.result-type-name{font-size:1.5rem;font-weight:700;margin-bottom:4px}
.result-type-role{font-size:1.1rem;color:rgba(255,255,255,0.7);margin-bottom:20px}
.result-description{font-size:.95rem;line-height:1.8;color:rgba(255,255,255,0.8);text-align:left;margin-bottom:24px;padding:0 4px}
.dimension-results{margin-bottom:28px}
.dim-bar{margin-bottom:14px}
.dim-label{display:flex;justify-content:space-between;font-size:.85rem;margin-bottom:4px;color:rgba(255,255,255,0.6)}
.dim-label .active{color:#fff;font-weight:700}
.dim-track{width:100%;height:8px;background:rgba(255,255,255,0.08);border-radius:4px;overflow:hidden}
.dim-fill{height:100%;border-radius:4px;transition:width 1s cubic-bezier(0.22,1,0.36,1)}
.dim-fill.ei{background:linear-gradient(90deg,#667eea,#764ba2)}
.dim-fill.sn{background:linear-gradient(90deg,#4facfe,#00f2fe)}
.dim-fill.tf{background:linear-gradient(90deg,#f093fb,#f5576c)}
.dim-fill.jp{background:linear-gradient(90deg,#43e97b,#38f9d7)}
.btn-restart{display:inline-block;padding:14px 44px;font-size:1rem;font-weight:700;color:#fff;background:rgba(255,255,255,0.1);border:1.5px solid rgba(255,255,255,0.2);border-radius:50px;cursor:pointer;transition:all .3s ease;letter-spacing:1px}
.btn-restart:hover{background:rgba(255,255,255,0.18);transform:translateY(-2px)}
.ripple{position:relative;overflow:hidden}
.ripple::after{content:"";position:absolute;border-radius:50%;background:rgba(255,255,255,0.3);width:100px;height:100px;margin-top:-50px;margin-left:-50px;top:50%;left:50%;transform:scale(0);opacity:0;pointer-events:none}
.ripple:active::after{animation:rippleAnim .5s ease-out}
@keyframes rippleAnim{from{transform:scale(0);opacity:.6}to{transform:scale(4);opacity:0}}
.confetti-piece{position:fixed;width:10px;height:10px;z-index:100;pointer-events:none;animation:confettiFall var(--duration) ease-in forwards;animation-delay:var(--delay);opacity:0}
@keyframes confettiFall{0%{transform:translateY(-20vh) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
@media(max-width:600px){.card{padding:28px 20px;border-radius:20px}.title{font-size:1.6rem}.question-text{font-size:1.1rem}.option-btn{padding:14px 16px;font-size:.9rem}.result-type-badge{width:90px;height:90px;font-size:2.2rem}.nav-btn{padding:10px 20px;font-size:.85rem}.container{padding:12px;margin:8px}}
</style></head>
<body>
<div class="bg-particles"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
<div class="container"><div class="card">
<div class="screen active" id="startScreen">
<div class="logo-icon">🧠</div>
<h1 class="title">人格探索之旅</h1>
<p class="subtitle">发现你的人格代码 · 基于荣格心理学</p>
<p class="disclaimer">⚠️ 本测试基于荣格心理类型理论（Jungian Typology）设计，仅供参考与自我探索之用。<br>MBTI 并非临床诊断工具，人格是流动且多元的——测试结果反映的是偏好倾向，而非固定标签。</p>
<button class="btn-start ripple" onclick="startQuiz()">开始探索 →</button>
</div>
<div class="screen" id="quizScreen">
<div class="progress-wrapper">
<div class="progress-info"><span id="progressText">1 / 20</span><span id="dimensionTag" class="dimension-tag">⚡ 能量来源</span></div>
<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
</div>
<div class="question-area" id="questionArea">
<p class="question-text" id="questionText"></p>
<div class="options" id="optionsContainer"></div>
</div>
<div class="nav-buttons">
<button class="nav-btn" id="prevBtn" onclick="prevQuestion()">← 上一题</button>
<button class="nav-btn next" id="nextBtn" onclick="nextQuestion()">下一题 →</button>
<button class="nav-btn submit" id="submitBtn" onclick="submitQuiz()" style="display:none">✨ 查看结果</button>
</div>
</div>
<div class="screen" id="resultScreen">
<div class="result-type-badge" id="resultBadge">INFJ</div>
<h2 class="result-type-name" id="resultName">提倡者</h2>
<p class="result-type-role" id="resultRole">理想主义者 · 富有洞察力的引路人</p>
<div class="dimension-results" id="dimensionResults"></div>
<p class="result-description" id="resultDesc"></p>
<button class="btn-restart ripple" onclick="restartQuiz()">🔄 重新探索</button>
</div>
</div></div>
<script>
var QUESTIONS=[
{dimension:"EI",tag:"⚡ 能量来源",q:"在社交聚会或团队活动后，你的感受更接近哪一种？",a:"A. 精力充沛、兴致盎然，还想继续与人交流互动",b:"B. 感到些许疲惫，需要一段独处的时间来恢复能量"},
{dimension:"EI",tag:"⚡ 能量来源",q:"思考问题时，你更倾向于哪种方式？",a:"A. 边想边说，在与人讨论的过程中理清思路",b:"B. 先在脑中独立构思成熟，再与外界分享"},
{dimension:"EI",tag:"⚡ 能量来源",q:"你更偏爱哪种工作或学习环境？",a:"A. 充满活力的互动环境，与他人协作交流",b:"B. 安静独立的空间，专注沉浸于自己的任务"},
{dimension:"EI",tag:"⚡ 能量来源",q:"在初次见面的社交场合中，你通常会：",a:"A. 主动开启对话，结识新朋友感到自然",b:"B. 等待他人来搭话，或倾向于与认识的人交流"},
{dimension:"EI",tag:"⚡ 能量来源",q:"以下哪种描述与你更相符？",a:"A. 朋友众多、社交圈广泛，享受成为注意力的焦点",b:"B. 知己三五、关系深入，珍视一对一的深度交流"},
{dimension:"SN",tag:"🌱 感知方式",q:"当你观察周围的世界时，你更容易注意到什么？",a:"A. 眼前具体可见的细节、事实和实际发生的事",b:"B. 事物背后的模式、关联以及潜在的可能性"},
{dimension:"SN",tag:"🌱 感知方式",q:"你偏好哪种沟通或表达风格？",a:"A. 直接明了、实事求是，注重信息的准确性",b:"B. 善用比喻、联想，传达深层含义和整体图景"},
{dimension:"SN",tag:"🌱 感知方式",q:"学习新事物时，你更倾向于：",a:"A. 按照明确的步骤实践，掌握具体的方法和技能",b:"B. 先理解背后的原理框架，再探索各种可能性"},
{dimension:"SN",tag:"🌱 感知方式",q:"你更钦佩哪种类型的人？",a:"A. 脚踏实地、经验丰富、注重实效的实干家",b:"B. 富有远见、创意无限、善于洞察的梦想家"},
{dimension:"SN",tag:"🌱 感知方式",q:"当你阅读或观影时，你更享受其中的：",a:"A. 真实感人的故事细节和具体的情节发展",b:"B. 丰富的象征意义、深层主题和思想的启迪"},
{dimension:"TF",tag:"💡 决策方式",q:"做出重要决定时，你更依赖以下哪种原则？",a:"A. 理性分析——逻辑推理、客观数据和因果关系",b:"B. 情感考量——个人价值观、人文关怀和对他人的影响"},
{dimension:"TF",tag:"💡 决策方式",q:"当朋友向你倾诉烦恼时，你的第一反应通常是：",a:"A. 帮助TA分析问题的根源，提供理性的解决方案",b:"B. 先理解并承接TA的情绪，给予温暖的情感支持"},
{dimension:"TF",tag:"💡 决策方式",q:"你更希望别人如何评价你的处事风格？",a:"A. 客观公正、理性果断、坚持原则",b:"B. 善解人意、温暖体贴、顾及他人感受"},
{dimension:"TF",tag:"💡 决策方式",q:"面对争议或矛盾时，你更在意的是什么？",a:"A. 厘清是非对错，找到符合逻辑的最佳方案",b:"B. 缓和紧张氛围，维护人际关系中的和谐"},
{dimension:"TF",tag:"💡 决策方式",q:"在评价他人的表现时，你更倾向于：",a:"A. 直接坦诚地指出优点和不足，即使真话可能不好听",b:"B. 先给予肯定和鼓励，用温和的方式提出改进建议"},
{dimension:"JP",tag:"🗓️ 生活态度",q:"你对日程安排和计划的看法更接近哪一种？",a:"A. 计划让我有安全感和掌控感，我喜欢提前安排好一切",b:"B. 计划让我感到束缚，我更喜欢灵活机动、随遇而安"},
{dimension:"JP",tag:"🗓️ 生活态度",q:"你处理任务的方式通常是：",a:"A. 列出清单、设定目标，逐项完成以获得成就感",b:"B. 心中有数即可，根据当下的灵感和状态灵活推进"},
{dimension:"JP",tag:"🗓️ 生活态度",q:"计划一场旅行时，你更倾向于：",a:"A. 做足攻略——订好住宿、路线和每日行程安排",b:"B. 确定大方向即可，留出空间给旅途中的意外惊喜"},
{dimension:"JP",tag:"🗓️ 生活态度",q:"面对截止日期（Deadline）时，你的状态更接近：",a:"A. 提前规划、分阶段推进，确保从容地按时完成",b:"B. 前期自由探索，最后阶段集中冲刺爆发"},
{dimension:"JP",tag:"🗓️ 生活态度",q:"你的生活空间（书桌/房间）通常是怎样的？",a:"A. 整洁有序、各归其位，环境整洁让我的思维更清晰",b:"B. 看似随意但有自己的一套逻辑，乱中有序"}
];
var T={};
T.ISTJ={name:"物流师",role:"务实可靠 · 责任感的守护者",desc:"你是一位脚踏实地、值得信赖的人。你注重事实、细节和结构，有强烈的责任感和执行力。你信奉传统和秩序，做事一丝不苟，是团队中最可靠的支柱。你的世界建立在经验和事实上，你擅长将复杂的事情系统化，并坚持不懈地执行到底。"};
T.ISFJ={name:"守护者",role:"温暖细腻 · 默默付出的守护天使",desc:"你是一位温和而坚定的守护者。你有着敏锐的观察力，善于察觉他人的需求和情绪。你重视和谐、忠诚和责任感，总是在幕后默默付出。你珍视传统，注重细节，以实际的行动表达你的关心。在他人眼中，你温暖、体贴、无私。"};
T.INFJ={name:"提倡者",role:"理想主义 · 富有洞察力的引路人",desc:"你是一位稀有的、富有远见的理想主义者。你拥有深刻的洞察力和对人类情感的敏锐理解，能看到事物背后的深层意义和未来的可能性。你追求有意义的目标，渴望让世界变得更好。你善于倾听和理解他人深层的需求，总能在适当的时机给出恰到好处的建议。"};
T.INTJ={name:"建筑师",role:"战略思维 · 独立睿智的蓝图规划者",desc:"你是一位独立思考的战略家。你有清晰的长远愿景和卓越的系统思维能力，善于从全局出发构建复杂的理论体系。你追求知识和能力上的卓越，对无意义的社交缺乏耐心。你独立、果断、高标准，总在不断地完善自己和周围的世界。"};
T.ISTP={name:"鉴赏家",role:"灵活冷静 · 动手能力极强的探险家",desc:"你是一位冷静、灵活且善于观察的实干家。你天生对事物运作原理有深刻的理解。你享受动手解决问题带来的即时满足感。你独立、随性、适应力强，善于在危机中保持冷静并找到实用的解决方案。"};
T.ISFP={name:"探险家",role:"温柔敏感 · 用心灵感受世界的艺术家",desc:"你是一位温柔、安静且极具审美天赋的探索者。你用感官细腻地体验世界的色彩、质感和情感。你珍视个人空间和自由，不喜欢被规则束缚。你对美有天然的感知力，生活中处处都是你的画布。"};
T.INFP={name:"调停者",role:"诗意浪漫 · 理想主义的追梦人",desc:"你是一位充满诗意和理想的追梦者。你拥有深邃的内心世界和丰富的想象力，始终在追寻真实、意义和美。你对他人的苦难感同身受，渴望让世界变得更加美好。你的价值观是你人生的指南针——为信念而活。"};
T.INTP={name:"逻辑学家",role:"理性好奇 · 永不停歇的思维探索者",desc:"你是一位热爱思考、永不满足的求知者。你的大脑始终在分析、解构和重构这个世界的一切。你对理论模型和抽象概念有着天然的痴迷，享受纯粹思维的乐趣。你追求逻辑的一致性和知识的深度。"};
T.ESTP={name:"企业家",role:"精力充沛 · 行动力爆棚的冒险家",desc:"你是一位天生的行动派和冒险家。你精力充沛、反应敏捷，善于抓住当下的机会。你有着极强的说服力和人际魅力，能在社交场合中游刃有余。你享受风险和挑战，在压力下反而表现得更好。"};
T.ESFP={name:"表演者",role:"热情洋溢 · 把快乐带给每个人的小太阳",desc:"你是一位天生的表演者和气氛制造者。你热情、乐观、充满活力，是社交场合中最闪亮的星。你有着丰富的幽默感和感染力，能让周围的人感到快乐和放松。你享受当下的每一刻，热爱所有能带来美好体验的事物。"};
T.ENFP={name:"活动家",role:"自由奔放 · 充满灵感的创意催化剂",desc:"你是一位充满热情和创造力的灵感源泉。你有着丰富的想象力和对人性的深刻理解，善于在看似无关的事物之间建立奇妙的联系。你追求自由和可能性，有着极强的同理心和感染力，总能点燃他人心中的热情。"};
T.ENTP={name:"辩论家",role:"机智敏捷 · 用思想颠覆世界的发明家",desc:"你是一位机智过人、热爱辩论的思想发明家。你的大脑运转速度极快，总是能从意想不到的角度分析和解构问题。你享受智力上的交锋和挑战，对新观念和新可能性充满好奇。你不在乎打破规则——规则存在的意义就是被优化。"};
T.ESTJ={name:"总经理",role:"高效果断 · 秩序与效率的践行者",desc:"你是一位天生的组织者和领导者。你注重效率、秩序和结果，有着极强的执行力。你信奉规则和标准，认为清晰的结构是高效运作的基础。你坦率直接、务实果断，在管理和组织方面有着卓越的天赋。"};
T.ESFJ={name:"执政官",role:"热情周到 · 社交圈中的温暖纽带",desc:"你是一位温暖、热心且极具社交天赋的关怀者。你重视人际关系和责任，时刻关注他人的需求。你有着出色的组织能力和亲和力，善于营造和谐温馨的氛围。你是大家心中最可靠的朋友。"};
T.ENFJ={name:"主人公",role:"魅力超凡 · 天生鼓舞人心的领袖",desc:"你是一位天生的领袖和鼓舞者。你有着非凡的感召力和人际洞察力，能够看到他人身上的潜力并激励他们成长。你热情、真诚、有远见，善于凝聚团队朝着共同的目标前进。你善于将愿景转化为集体的行动。"};
T.ENTJ={name:"指挥官",role:"果断坚定 · 高瞻远瞩的战略领袖",desc:"你是一位果断、自信且极具战略眼光的统帅。你有着敏锐的洞察力和长远规划能力，能够迅速抓住问题的本质并制定高效的解决方案。你追求效率和成果，敢于做出艰难的决定。你不断追求进步和卓越。"};
</script>
<script>
var state={currentQ:0,answers:new Array(QUESTIONS.length).fill(null),scores:{E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0}};
function showScreen(id){document.querySelectorAll(".screen").forEach(function(s){s.classList.remove("active")});document.getElementById(id).classList.add("active")}
function startQuiz(){state={currentQ:0,answers:new Array(QUESTIONS.length).fill(null),scores:{E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0}};showScreen("quizScreen");renderQuestion(0)}
function renderQuestion(i){
  var q=QUESTIONS[i];
  var a=document.getElementById("questionArea");
  a.classList.remove("question-transition");void a.offsetWidth;a.classList.add("question-transition");
  document.getElementById("questionText").textContent=q.q;
  document.getElementById("dimensionTag").textContent=q.tag;
  document.getElementById("progressText").textContent=(i+1)+" / "+QUESTIONS.length;
  document.getElementById("progressFill").style.width=((i+1)/QUESTIONS.length*100)+"%";
  var c=document.getElementById("optionsContainer");c.innerHTML="";
  [[0],[1]].forEach(function(x){
    var k=x[0]===0?"a":"b",l=k.toUpperCase(),t=k==="a"?q.a:q.b;
    var b=document.createElement("button");
    b.className="option-btn ripple";
    if(state.answers[i]===k)b.classList.add("selected");
    b.innerHTML="<span class=\"option-letter\">"+l+"</span><span class=\"option-text\">"+t+"</span>";
    b.onclick=function(){selectOption(i,k)};
    c.appendChild(b);
  });
  var p=document.getElementById("prevBtn"),n=document.getElementById("nextBtn"),s=document.getElementById("submitBtn");
  p.style.display=i===0?"none":"inline-block";
  var last=i===QUESTIONS.length-1;
  n.style.display=last?"none":"inline-block";
  s.style.display=last?"inline-block":"none";
  if(last){s.disabled=!state.answers.every(function(a){return a!==null})}else{n.disabled=state.answers[i]===null}
}
function selectOption(i,k){
  state.answers[i]=k;
  document.querySelectorAll(".option-btn").forEach(function(b){
    var l=b.querySelector(".option-letter");
    if(l&&l.textContent.trim().toLowerCase()===k){b.classList.add("selected")}else{b.classList.remove("selected")}
  });
  var last=i===QUESTIONS.length-1;
  if(last){document.getElementById("submitBtn").disabled=!state.answers.every(function(a){return a!==null})}else{document.getElementById("nextBtn").disabled=false}
}
function nextQuestion(){if(state.currentQ<QUESTIONS.length-1&&state.answers[state.currentQ]!==null){state.currentQ++;renderQuestion(state.currentQ)}}
function prevQuestion(){if(state.currentQ>0){state.currentQ--;renderQuestion(state.currentQ)}}
function submitQuiz(){
  var s={E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0};
  QUESTIONS.forEach(function(q,i){
    var a=state.answers[i];if(!a)return;
    switch(q.dimension){case"EI":a==="a"?s.E++:s.I++;break;case"SN":a==="a"?s.S++:s.N++;break;case"TF":a==="a"?s.T++:s.F++;break;case"JP":a==="a"?s.J++:s.P++;break}
  });
  state.scores=s;
  var t="";
  t+=(s.E>=s.I?"E":"I");t+=(s.S>=s.N?"S":"N");t+=(s.T>=s.F?"T":"F");t+=(s.J>=s.P?"J":"P");
  showResult(t)
}
function showResult(t){
  showScreen("resultScreen");
  var i=T[t]||{name:"探索者",role:"独一无二的你",desc:"你是如此独特，无法被简单定义。继续探索自我吧！"};
  document.getElementById("resultBadge").textContent=t;
  document.getElementById("resultName").textContent=i.name;
  document.getElementById("resultRole").textContent=i.role;
  document.getElementById("resultDesc").textContent=i.desc;
  var d=document.getElementById("dimensionResults");d.innerHTML="";
  var ds=[{l:"外向 (E)",o:"内向 (I)",k:"E",ok:"I",c:"ei"},{l:"实感 (S)",o:"直觉 (N)",k:"S",ok:"N",c:"sn"},{l:"理性 (T)",o:"情感 (F)",k:"T",ok:"F",c:"tf"},{l:"判断 (J)",o:"感知 (P)",k:"J",ok:"P",c:"jp"}];
  ds.forEach(function(x){
    var ttl=state.scores[x.k]+state.scores[x.ok],pct=ttl>0?(state.scores[x.k]/ttl)*100:50,act=state.scores[x.k]>=state.scores[x.ok];
    var b=document.createElement("div");b.className="dim-bar";
    b.innerHTML="<div class=\"dim-label\"><span class=\""+(act?"active":"")+"\">"+x.l+" ("+state.scores[x.k]+")</span><span class=\""+(!act?"active":"")+"\">"+x.o+" ("+state.scores[x.ok]+")</span></div><div class=\"dim-track\"><div class=\"dim-fill "+x.c+"\" style=\"width:0%\"></div></div>";
    d.appendChild(b);
    requestAnimationFrame(function(){b.querySelector(".dim-fill").style.width=pct+"%"})
  });
  launchConfetti()
}
function launchConfetti(){
  var cs=["#f093fb","#f5576c","#4facfe","#43e97b","#ffd93d","#ff6b6b","#a29bfe","#00cec9"];
  for(var i=0;i<60;i++){
    var p=document.createElement("div");p.className="confetti-piece";
    var c=cs[Math.floor(Math.random()*cs.length)],sz=6+Math.random()*10,l=Math.random()*100,dl=Math.random()*2,dr=2+Math.random()*3;
    p.style.cssText="left:"+l+"%;width:"+sz+"px;height:"+sz*(0.5+Math.random())+"px;background:"+c+";border-radius:"+(Math.random()>0.5?"50%":"2px")+";--delay:"+dl+"s;--duration:"+dr+"s;";
    document.body.appendChild(p);
    setTimeout(function(){p.remove()},(dl+dr)*1000+200)
  }
}
function restartQuiz(){state={currentQ:0,answers:new Array(QUESTIONS.length).fill(null),scores:{E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0}};showScreen("startScreen")}
</script></body></html>
